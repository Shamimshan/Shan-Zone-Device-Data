<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHAN ZONE NOC — Device Management</title>
<style>
  /* ===== CONFIG ===================================================
     Yahan apna deployed Apps Script Web App URL daalo (ends with /exec)
     ================================================================= */
</style>
</head>
<body>

<script>
  const CONFIG = {
    API_URL: "https://script.google.com/macros/s/AKfycbx3KFDSapDImMbbf993dpn-sUBIY6PpQR14HSzbr6UF33BvyV0_OM-zk31jiutMpy6XJA/exec"
  };
</script>

<style>
  :root{
    --bg: #0b1220;
    --panel: #111b2e;
    --panel-2: #16223a;
    --border: #24314d;
    --text: #dbe4f5;
    --text-dim: #8493b0;
    --accent: #35d0c0;
    --accent-dim: #1c8e83;
    --online: #35d0c0;
    --offline: #ff6b6b;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* subtle grid texture, NOC-console feel */
  body::before{
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(53,208,192,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53,208,192,0.035) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand{
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand .dot{
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse{
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .brand h1{
    font-size: 18px;
    letter-spacing: 0.06em;
    margin: 0;
    font-weight: 700;
  }
  .brand h1 span{ color: var(--accent); }

  .brand .sub{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .clock{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }

  /* Dashboard cards */
  .stats{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat::after{
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat.total::after{ background: var(--accent); }
  .stat.online::after{ background: var(--online); }
  .stat.offline::after{ background: var(--offline); }

  .stat .label{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat .value{
    font-size: 32px;
    font-weight: 700;
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
  }
  .stat.online .value{ color: var(--online); }
  .stat.offline .value{ color: var(--offline); }

  /* Toolbar */
  .toolbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toolbar .title{
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  button{
    font-family: var(--sans);
    cursor: pointer;
    border: none;
    border-radius: 7px;
    font-weight: 600;
    font-size: 13px;
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button:active{ transform: scale(0.97); }

  .btn-primary{
    background: var(--accent);
    color: #06231f;
    padding: 9px 16px;
  }
  .btn-primary:hover{ filter: brightness(1.08); }

  .btn-ghost{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
  }
  .btn-ghost:hover{ color: var(--text); border-color: var(--accent-dim); }

  .btn-danger{
    background: transparent;
    color: var(--offline);
    border: 1px solid rgba(255,107,107,0.35);
    padding: 6px 12px;
  }
  .btn-danger:hover{ background: rgba(255,107,107,0.1); }

  /* Table */
  .table-wrap{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table{
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead th{
    text-align: left;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
  }

  tbody td{
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tbody tr:last-child td{ border-bottom: none; }
  tbody tr:hover{ background: rgba(255,255,255,0.02); }

  .mono{ font-family: var(--mono); color: var(--text-dim); font-size: 12.5px; }

  .status-pill{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-pill.Online{ background: rgba(53,208,192,0.12); color: var(--online); }
  .status-pill.Offline{ background: rgba(255,107,107,0.12); color: var(--offline); }
  .status-pill::before{
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .row-actions{ display: flex; gap: 6px; }

  .empty-state{
    text-align: center;
    padding: 50px 20px;
    color: var(--text-dim);
  }
  .empty-state .glyph{
    font-size: 28px;
    margin-bottom: 8px;
    opacity: 0.5;
  }
  .empty-state p{ font-size: 13px; margin: 4px 0; }

  /* Modal */
  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(5,8,16,0.7);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.open{ display: flex; }

  .modal{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    padding: 24px;
  }

  .modal h2{
    margin: 0 0 18px;
    font-size: 15px;
    letter-spacing: 0.03em;
  }

  .field{ margin-bottom: 14px; }
  .field label{
    display: block;
    font-size: 11.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .field input, .field select{
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    font-size: 13.5px;
    font-family: var(--sans);
  }
  .field input:focus, .field select:focus{
    outline: none;
    border-color: var(--accent);
  }

  .modal-actions{
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--accent-dim);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 20;
    font-family: var(--mono);
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error{ border-color: var(--offline); color: var(--offline); }

  @media (max-width: 640px){
    .stats{ grid-template-columns: 1fr; }
    .table-wrap{ overflow-x: auto; }
    table{ min-width: 640px; }
  }
</style>

<div class="wrap">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>SHAN ZONE <span>NOC</span></h1>
        <div class="sub">DEVICE MANAGEMENT CONSOLE</div>
      </div>
    </div>
    <div class="clock" id="clock">—</div>
  </header>

  <div class="stats">
    <div class="stat total">
      <div class="label">Total Devices</div>
      <div class="value" id="statTotal">0</div>
    </div>
    <div class="stat online">
      <div class="label">Online</div>
      <div class="value" id="statOnline">0</div>
    </div>
    <div class="stat offline">
      <div class="label">Offline</div>
      <div class="value" id="statOffline">0</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="title">Registered Devices</div>
    <div style="display:flex; gap:8px;">
      <button class="btn-ghost" onclick="loadDevices()">↻ Refresh</button>
      <button class="btn-primary" onclick="openModal()">+ Add Device</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Serial</th>
          <th>IP Address</th>
          <th>Model</th>
          <th>Location</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7"><div class="empty-state"><div class="glyph">◌</div><p>Loading devices…</p></div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Add/Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add Device</h2>
    <input type="hidden" id="deviceId">
    <div class="field">
      <label>Name</label>
      <input type="text" id="fName" placeholder="e.g. Router-Sector-3">
    </div>
    <div class="field">
      <label>Serial Number</label>
      <input type="text" id="fSerial" placeholder="e.g. SN-88213">
    </div>
    <div class="field">
      <label>IP Address</label>
      <input type="text" id="fIp" placeholder="e.g. 192.168.1.20">
    </div>
    <div class="field">
      <label>Model</label>
      <input type="text" id="fModel" placeholder="e.g. TP-Link AC1200">
    </div>
    <div class="field">
      <label>Location</label>
      <input type="text" id="fLocation" placeholder="e.g. Zone A, Tower 2">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="fStatus">
        <option value="Online">Online</option>
        <option value="Offline">Offline</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDevice()">Save Device</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ===================================================================
     SHAN ZONE NOC — Frontend Logic
     Talks to the Apps Script Web App via fetch (CORS-safe pattern:
     POST body sent as text/plain to avoid preflight issues with GAS)
     =================================================================== */

  let devices = [];

  function updateClock(){
    document.getElementById('clock').textContent =
      new Date().toLocaleString('en-IN', { hour12: true });
  }
  updateClock();
  setInterval(updateClock, 1000);

  function showToast(msg, isError){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 2200);
  }

  function apiGet(action){
    return fetch(CONFIG.API_URL + '?action=' + action)
      .then(r => r.json());
  }

  function apiPost(action, data){
    return fetch(CONFIG.API_URL, {
      method: 'POST',
      // text/plain avoids a CORS preflight (OPTIONS) request,
      // which Apps Script web apps do not handle.
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, data })
    }).then(r => r.json());
  }

  function loadDevices(){
    if (!CONFIG.API_URL || CONFIG.API_URL.indexOf('PASTE_YOUR') === 0){
      renderEmpty("Apps Script URL abhi set nahi hai — index.html ke CONFIG.API_URL mein deploy URL daalein.");
      return;
    }
    apiGet('list').then(res => {
      if (res.success){
        devices = res.data;
        renderTable();
        renderStats();
      } else {
        showToast(res.error, true);
      }
    }).catch(() => showToast('Network/API error — URL check karein', true));
  }

  function renderStats(){
    const total = devices.length;
    const online = devices.filter(d => d.status === 'Online').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statOnline').textContent = online;
    document.getElementById('statOffline').textContent = total - online;
  }

  function renderEmpty(message){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="7"><div class="empty-state"><div class="glyph">○</div><p>${message}</p></div></td></tr>`;
  }

  function renderTable(){
    const body = document.getElementById('tableBody');

    if (devices.length === 0){
      renderEmpty('Koi device nahi mila. "+ Add Device" se pehla device add karein.');
      return;
    }

    body.innerHTML = devices.map(d => `
      <tr>
        <td>${escapeHtml(d.name)}</td>
        <td class="mono">${escapeHtml(d.serial || '—')}</td>
        <td class="mono">${escapeHtml(d.ip || '—')}</td>
        <td>${escapeHtml(d.model || '—')}</td>
        <td>${escapeHtml(d.location || '—')}</td>
        <td><span class="status-pill ${d.status}">${d.status}</span></td>
        <td>
          <div class="row-actions">
            <button class="btn-ghost" onclick="editDevice('${d.id}')">Edit</button>
            <button class="btn-danger" onclick="removeDevice('${d.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function escapeHtml(str){
    if (str === undefined || str === null) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function openModal(device){
    document.getElementById('modalTitle').textContent = device ? 'Edit Device' : 'Add Device';
    document.getElementById('deviceId').value = device ? device.id : '';
    document.getElementById('fName').value = device ? device.name : '';
    document.getElementById('fSerial').value = device ? device.serial : '';
    document.getElementById('fIp').value = device ? device.ip : '';
    document.getElementById('fModel').value = device ? device.model : '';
    document.getElementById('fLocation').value = device ? device.location : '';
    document.getElementById('fStatus').value = device ? device.status : 'Offline';
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal(){
    document.getElementById('overlay').classList.remove('open');
  }

  function editDevice(id){
    const d = devices.find(x => x.id === id);
    if (d) openModal(d);
  }

  function saveDevice(){
    const id = document.getElementById('deviceId').value;
    const data = {
      name: document.getElementById('fName').value.trim(),
      serial: document.getElementById('fSerial').value.trim(),
      ip: document.getElementById('fIp').value.trim(),
      model: document.getElementById('fModel').value.trim(),
      location: document.getElementById('fLocation').value.trim(),
      status: document.getElementById('fStatus').value
    };

    if (!data.name){
      showToast('Device name zaroori hai', true);
      return;
    }

    const action = id ? 'update' : 'create';
    if (id) data.id = id;

    apiPost(action, data).then(res => {
      if (res.success){
        showToast(id ? 'Device updated' : 'Device added');
        closeModal();
        loadDevices();
      } else {
        showToast(res.error, true);
      }
    }).catch(() => showToast('Network/API error', true));
  }

  function removeDevice(id){
    if (!confirm('Ye device delete karna hai?')) return;

    apiPost('delete', { id }).then(res => {
      if (res.success){
        showToast('Device deleted');
        loadDevices();
      } else {
        showToast(res.error, true);
      }
    }).catch(() => showToast('Network/API error', true));
  }

  // Initial load
  loadDevices();
</script>

</body>
</html>
