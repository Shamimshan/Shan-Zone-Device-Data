<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Zone | Secure Device Management Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary: #0a192f;
            --secondary: #112240;
            --accent: #64ffda;
            --text-main: #ccd6f6;
            --text-dark: #333333;
            --btn-save: #28a745;
            --btn-update: #fd7e14;
            --btn-reset: #dc3545;
            --btn-print: #17a2b8;
            --success: #28a745;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            padding: 20px; 
            display: none; /* Hidden until login */
        }
        
        .portal-container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }

        /* Header Styles */
        .header-section {
            background-color: var(--primary);
            color: white;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }
        .header-section h1 { margin: 0; font-size: 24px; letter-spacing: 1px; text-transform: uppercase; }
        .header-section p { margin: 5px 0 0; font-size: 12px; color: var(--text-main); }

        .search-bar { background: #eef2f7; padding: 15px 25px; display: flex; gap: 15px; align-items: center; border-bottom: 1px solid #ddd;}
        .search-bar input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Poppins', sans-serif;}
        
        .form-content { padding: 25px; }
        .section-title { background: var(--primary); color: var(--accent); padding: 8px 15px; margin: 20px 0 10px; border-radius: 4px; font-size: 14px; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        
        .input-group { position: relative; display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-dark); }
        .input-group input, .input-group select { padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-family: 'Poppins', sans-serif; transition: border 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); outline: none; }
        .input-group input[readonly] { background: #f8f9fa; color: #666; }

        /* Action Icons inside input */
        .icon-btn { position: absolute; right: 10px; top: 32px; background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 16px; }
        .icon-btn:hover { color: #007bff; }

        .action-buttons { margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; border-top: 1px solid #eee; padding-top: 20px;}
        .btn { padding: 12px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-search { background: var(--primary); }
        .btn-reset { background: var(--btn-reset); }
        .btn-save { background: var(--btn-save); }
        .btn-update { background: var(--btn-update); }
        .btn-print { background: var(--btn-print); }

        /* Loader & Toast Popup */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 25, 47, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; color: #fff; flex-direction: column; }
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast { position: fixed; top: 20px; right: -300px; background: #333; color: #fff; padding: 15px 25px; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: right 0.4s ease; z-index: 1001; font-weight: 500; }
        .toast.success { background: var(--success); border-left: 5px solid #1e7e34; }
        .toast.error { background: var(--btn-reset); border-left: 5px solid #a71d2a; }
        .toast.show { right: 20px; }

        /* Print Settings */
        @media print {
            body { background: #fff; padding: 0; display: block !important;}
            .portal-container { box-shadow: none; border: none; padding: 0; }
            .header-section { color: #000; background: #fff; border-bottom: 2px solid #000; padding: 15px 0;}
            .header-section p { color: #333; }
            .no-print { display: none !important; }
            .section-title { background: #f0f0f0; color: #000; border: 1px solid #000; margin-top: 15px; page-break-after: avoid; }
            .input-group input, .input-group select { border: none; border-bottom: 1px solid #000; border-radius: 0; padding: 5px 0; background: transparent; }
            .icon-btn { display: none; }
        }
    </style>
</head>
