<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Zone | Device Management Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8; --primary: #0a192f; --secondary: #112240; --accent: #64ffda;
            --text-main: #ccd6f6; --text-dark: #333333; --btn-save: #007bff;
            --btn-update: #fd7e14; --btn-reset: #dc3545; --btn-print: #17a2b8; --success: #28a745;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: none; }
        .portal-container { max-width: 900px; margin: 0 auto; background: #ffffff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .header-section { background-color: var(--primary); color: white; padding: 25px 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .header-section h1 { margin: 0; font-size: 24px; text-transform: uppercase; }
        .search-bar { background: #eef2f7; padding: 15px 25px; display: flex; gap: 15px; border-bottom: 1px solid #ddd; }
        .form-grid { padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section-divider { background: #0a192f; color: #64ffda; padding: 10px 20px; margin: 20px 25px 0 25px; border-radius: 6px; display: flex; align-items: center; }
        .section-divider h3 { margin: 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        @media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .input-group input, .input-group select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .action-buttons { padding: 20px 25px 30px; display: flex; justify-content: flex-end; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--btn-save); } .btn-update { background: var(--btn-update); }
        .btn-reset { background: var(--btn-reset); } .btn-print { background: var(--btn-print); }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="header-section"><h1>SHAN ZONE</h1></div>
        <div class="search-bar">
            <input type="text" id="searchId" placeholder="Enter User ID to search...">
            <button class="btn-search" onclick="searchData()">Search</button>
        </div>

        <form id="deviceForm">
            <input type="hidden" id="rowIdx">
            <div class="form-grid">
                <div class="input-group"><label>S. No.</label><input type="text" id="sno" readonly></div>
                <div class="input-group"><label>Date & Time</label><input type="text" id="datetime" readonly></div>
                <div class="input-group"><label>User ID *</label><input type="text" id="userid" required></div>
                <div class="input-group"><label>Device Name</label><input type="text" id="devicename"></div>
                <div class="input-group"><label>Device IP</label><input type="text" id="deviceip"></div>
                <div class="input-group"><label>Online IP</label><input type="text" id="deviceiponline"></div>
                <div class="input-group"><label>Username</label><input type="text" id="user"></div>
                <div class="input-group"><label>Password</label><input type="password" id="password"></div>
                <div class="input-group"><label>Link Type</label><select id="linktype"><option value="Fiber">Fiber</option><option value="Wireless">Wireless</option></select></div>
                <div class="input-group"><label>RX / TX</label><input type="text" id="rxtx"></div>
                <div class="input-group"><label>Location</label><input type="text" id="location"></div>
                <div class="input-group"><label>TR069</label><select id="tr069"><option value="Enabled">Enabled</option><option value="Disabled">Disabled</option></select></div>
                <div class="input-group"><label>ACS Address</label><input type="text" id="acsaddress"></div>
            </div>

            <!-- नया सेक्शन -->
            <div class="section-divider"><h3><i class="fas fa-microchip"></i> Device Technical Details</h3></div>
            <div class="form-grid">
                <div class="input-group"><label>Model Number</label><input type="text" id="modelno" name="modelno"></div>
                <div class="input-group"><label>MAC Address</label><input type="text" id="macaddr" name="macaddr"></div>
                <div class="input-group"><label>Serial Number</label><input type="text" id="serialno" name="serialno"></div>
                <div class="input-group"><label>Purchase Date</label><input type="date" id="pdate" name="pdate"></div>
                <div class="input-group"><label>Invoice Number</label><input type="text" id="invoiceno" name="invoiceno"></div>
                <div class="input-group"><label>Vendor</label><input type="text" id="vendor" name="vendor"></div>
                <div class="input-group"><label>Installation Date</label><input type="date" id="idate" name="idate"></div>
            </div>

            <div class="action-buttons">
                <button type="button" class="btn btn-reset" onclick="resetForm()">Reset</button>
                <button type="button" class="btn btn-save" onclick="submitData('save')">Save</button>
                <button type="button" class="btn btn-update" onclick="submitData('update')">Update</button>
            </div>
        </form>
    </div>

    <script>
        const SECRET_KEY = "shanzone_admin_786";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymhYbwBDmyEqqABmsMb37BMJH4dyaDlGXswXEcyK9HiSBuKCQwXRpv-Nh5y9kEuKsUog/exec";

        function submitData(action) {
            let params = new URLSearchParams(new FormData(document.getElementById('deviceForm')));
            params.append("action", action);
            params.append("key", SECRET_KEY);
            params.append("row", document.getElementById('rowIdx').value);
            
            fetch(SCRIPT_URL, {method: 'POST', body: params})
            .then(res => res.text()).then(msg => alert(msg));
        }

        function searchData() {
            let id = document.getElementById('searchId').value;
            fetch(`${SCRIPT_URL}?id=${id}&key=${SECRET_KEY}`)
            .then(res => res.json()).then(data => {
                if(data === "Not Found") alert("Not Found");
                else {
                    for (let key in data) {
                        if(document.getElementById(key)) document.getElementById(key).value = data[key];
                    }
                    document.getElementById('rowIdx').value = data.row;
                }
            });
        }
        
        function resetForm() { document.getElementById('deviceForm').reset(); }
    </script>
</body>
</html>
